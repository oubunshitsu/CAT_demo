{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign in</title>
  <link rel="stylesheet" href="{% static 'ca_practice/task.css' %}">
  <style>
    .auth-card {
      max-width: 420px;
      margin: 80px auto;
      padding: 24px 28px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    .auth-title {
      margin: 0 0 12px 0;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
    }

    .auth-form .field {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .auth-form label {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .auth-form input {
      padding: 10px;
      border: 1px solid #cfd3d8;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
    }

    .auth-form button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 2px solid #000;
      border-radius: 12px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
    }

    .auth-form button:hover {
      background: #fff;
      color: #000;
    }

    .auth-note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #555;
      text-align: center;
      line-height: 1.4;
    }

    .auth-error {
      margin: 0 0 12px 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: #ffe8e6;
      border: 1px solid #f3b3ac;
      color: #9c2c21;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <h1 class="auth-title">Sign in</h1>

    {% if form.errors %}
    <div class="auth-error">Check your username and password and try again.</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}

      <div class="field">
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>

      <div class="field">
        <label for="id_password">Password</label>
        {{ form.password }}
      </div>

      <button type="submit">Sign in</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>

    <p class="auth-note">
      Use one of the existing users (e.g., the superuser you created).
    </p>
    <!--
    <p class="auth-note">
      New here? <a href="{% url 'ca_practice:signup' %}">Create an account</a>
    </p>
    -->
  </div>
</body>

</html>
