{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preparing your structures...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Manrope", system-ui, sans-serif;
      background: #f5f7fb;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loader-card {
      background: white;
      padding: 32px 40px;
      border-radius: 16px;
      border: 1px solid #edf0f6;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
      width: 360px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e9edff;
      overflow: hidden;
      margin: 6px auto 20px;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #4f46e5, #6a63ff);
      border-radius: 999px;
      animation: progress 1.2s ease-in-out infinite;
    }
    @keyframes progress {
      0% { transform: translateX(-60%); }
      50% { transform: translateX(60%); }
      100% { transform: translateX(160%); }
    }
    .status { font-size: 16px; color: #1f2937; margin-bottom: 6px; font-weight: 600; }
    .sub { font-size: 14px; color: #6b7280; }
    .error { color: #b00020; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="loader-card">
    <div class="progress-track" aria-hidden="true">
      <div class="progress-bar"></div>
    </div>
    <div class="status">Analyzing your counter-argument...</div>
    <div class="sub">This can take around 30 seconds.</div>
    <div id="error" class="error" style="display:none;"></div>
  </div>

  <script>
    function getCsrfToken() {
      const name = "csrftoken=";
      return document.cookie.split(";").map(c => c.trim()).find(c => c.startsWith(name))?.substring(name.length) || "";
    }

    async function prepare() {
      const url = "{% url 'ca_practice:prepare_structures' ca_id=ca_id %}";
      try {
        const resp = await fetch(url, {
          method: "POST",
          headers: {
            "X-CSRFToken": getCsrfToken(),
          },
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) {
          throw new Error(data.error || "Failed to prepare structures");
        }
        window.location.href = data.redirect;
      } catch (err) {
        const el = document.getElementById("error");
        el.textContent = err.message || "Something went wrong. Please retry.";
        el.style.display = "block";
      }
    }

    document.addEventListener("DOMContentLoaded", prepare);
  </script>
</body>
</html>
