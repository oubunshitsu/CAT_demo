{% load static %}
{% include "ca_practice/diagram_description.html" %}
    <style>
      /* body { */
      /*   font-family: system-ui, sans-serif; */
      /*   padding: 20px; */
      /* } */
      /* input { */
      /*   margin: 4px 0 10px; */
      /*   padding: 4px 8px; */
      /* } */
      /* .inputs { */
      /*   margin-bottom: 16px; */
      /* } */
      .diagram-container {
        width: 600px;
        height: 400px;
        border: 1px solid #ccc;
      }
    </style>
    <div id="root_mitigation"></div>

    <script>
      window.GRAPH_DEFAULTS_MITIGATION = {
        xText:
          "{{ s.x|default_if_none:''|escapejs }}",
        yText:
          "{{ s.y|default_if_none:''|escapejs }}",
        zText:
          "{{ s.z|default_if_none:''|escapejs }}",
        xToYLabel: "{{ s.xy_relation|default_if_none:''|escapejs }}",
        zToYLabel: "mitigates the {{ s.xy_relation|default_if_none:''|escapejs }} relation",
        xTopRightLabel: "{{ s.conclusion|default_if_none:''|escapejs }}",
        xTopLeftLabel: "Conclusion:",
        xMainLeftLabel: "Premise:",
        polarity: "{{ s.y_polarity_color|default_if_none:''|escapejs }}", // "green" or "red" badge on Y
        suppressTooltipText: "{{ s.suppress_tooltip_text|default:'Suppress relation between X and Y.'|escapejs }}",
        mitigationArrowTooltipText: "The system interprets that you are attacking the causal relation between '{{ s.x }}' and '{{ s.y }}' by claiming '{{ s.z }}' {{ s.mitigation_arrow_tooltip_text |default:''|escapejs }}",
        zPaddingTop: 50,
        zPaddingBottom: 14,
      };
    </script>

    <!-- React + ReactDOM + Babel (for JSX support in browser) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

    <!-- Load external React code (with presets + cache-bust) -->
    <script
      type="text/babel"
      data-presets="react"
      src="{% static 'ca_practice/mitigation.jsx' %}?v=24"
    ></script>
