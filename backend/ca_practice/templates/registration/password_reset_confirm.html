{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set new password</title>
  <link rel="stylesheet" href="{% static 'ca_practice/task.css' %}">
  <style>
    .auth-card { max-width: 460px; margin: 80px auto; padding: 24px 28px; background: #fff; border-radius: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
    .auth-title { margin: 0 0 12px 0; font-size: 1.4rem; font-weight: 700; text-align: center; }
    .field { margin-bottom: 12px; display: flex; flex-direction: column; }
    label { font-weight: 600; margin-bottom: 4px; }
    input { padding: 10px; border: 1px solid #cfd3d8; border-radius: 10px; font-size: 1rem; }
    button { width: 100%; padding: 10px; border: 2px solid #000; border-radius: 12px; background: #111; color: #fff; cursor: pointer; font-size: 1rem; font-weight: 700; }
    .auth-note { margin: 10px 0; color: #555; text-align: center; }
  </style>
</head>
<body>
  <div class="auth-card">
    {% if validlink %}
      <h1 class="auth-title">Set a new password</h1>
      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="id_new_password1">New password</label>
          {{ form.new_password1 }}
        </div>
        <div class="field">
          <label for="id_new_password2">Confirm new password</label>
          {{ form.new_password2 }}
        </div>
        <button type="submit">Update password</button>
      </form>
    {% else %}
      <h1 class="auth-title">Invalid reset link</h1>
      <p class="auth-note">This link has expired or is invalid. Please request a new password reset.</p>
    {% endif %}
  </div>
</body>
</html>
