{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password updated</title>
  <link rel="stylesheet" href="{% static 'ca_practice/task.css' %}">
  <style>
    .auth-card { max-width: 460px; margin: 80px auto; padding: 24px 28px; background: #fff; border-radius: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.08); text-align: center; }
    .auth-title { margin: 0 0 12px 0; font-size: 1.4rem; font-weight: 700; }
    .auth-note { margin: 12px 0; font-size: .95rem; color: #555; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1 class="auth-title">Password updated</h1>
    <p class="auth-note">Your password has been changed successfully.</p>
    <p class="auth-note"><a href="{% url 'login' %}">Sign in</a></p>
  </div>
</body>
</html>
